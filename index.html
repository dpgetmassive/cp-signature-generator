<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Cyber People — Email Signature Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────── */
  header {
    padding: 24px 32px;
    border-bottom: 1px solid #1a2332;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header img { height: 36px; width: auto; }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.5px;
  }
  header h1 span { color: #00c8ff; }

  /* ── Layout ───────────────────────────────── */
  .container {
    display: flex;
    gap: 32px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px;
  }

  .form-panel {
    flex: 0 0 360px;
  }

  .preview-panel {
    flex: 1;
    min-width: 0;
  }

  /* ── Form ──────────────────────────────────── */
  .form-panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #00c8ff;
    margin-bottom: 20px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .field input {
    width: 100%;
    padding: 10px 12px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 14px;
    transition: border-color 0.15s;
  }
  .field input:focus {
    outline: none;
    border-color: #00c8ff;
  }
  .field input::placeholder { color: #484f58; }

  /* ── Buttons ──────────────────────────────── */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }

  .btn-primary {
    background: #00c8ff;
    color: #0d1117;
  }
  .btn-secondary {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
  }

  /* ── Preview ──────────────────────────────── */
  .preview-panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #00c8ff;
    margin-bottom: 20px;
  }

  .preview-box {
    background: #ffffff;
    border-radius: 8px;
    padding: 24px;
    min-height: 180px;
  }

  /* ── Toast ─────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: #00c8ff;
    color: #0d1117;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Responsive ────────────────────────────── */
  @media (max-width: 800px) {
    .container { flex-direction: column; }
    .form-panel { flex: none; width: 100%; }
  }
</style>
</head>

            '</table>' +
          '</td>' +
        '</tr>' +
      '</table>';

    return html;
  }

  function render() {
    previewBox.innerHTML = buildSignatureHTML();
  }

  // Live preview on every keystroke
  fields.forEach(f => { inputs[f].addEventListener('input', render); });

  // Initial render
  render();

  // ── Copy ──────────────────────────────────
  window.copySignature = function () {
    const html = buildSignatureHTML();
    navigator.clipboard.writeText(html).then(() => {
      showToast('Copied!');
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = html;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied!');
    });
  };

  // ── Download ──────────────────────────────
  window.downloadSignature = function () {
    const v = inputs.fullName.value.trim();
    const slug = v
      ? v.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '')
      : 'signature';
    const filename = slug + '-signature.htm';
    const html = buildSignatureHTML();
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Downloaded!');
  };

  // ── Toast ─────────────────────────────────
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.classList.remove('show'); }, 2000);
  }
})();
</script>
